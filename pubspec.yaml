name: gestor_de_estoque
description: "Aplicativo mobile do Arara-Gastos."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.0
  go_router: ^17.2.3
  lucide_icons_flutter: ^3.1.14+2
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Instrument Sans
      fonts:
        - asset: assets/fonts/instrument_sans/InstrumentSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/instrument_sans/InstrumentSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/instrument_sans/InstrumentSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/instrument_sans/InstrumentSans-Bold.ttf
          weight: 700
